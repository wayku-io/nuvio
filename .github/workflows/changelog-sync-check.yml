name: Changelog Sync Check

on:
  pull_request:

jobs:
  verify-changelog-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Sync guide changelog
        run: bash scripts/sync-changelog.sh
      - name: Verify no diff
        run: |
          if ! git diff --quiet -- docs/guide/Changelog.md; then
            echo "docs/guide/Changelog.md is out of sync. Run: bash scripts/sync-changelog.sh"
            git --no-pager diff -- docs/guide/Changelog.md
            exit 1
          fi
